<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1> Calculadora de IMC</h1>
    <ul>
        <li>
            <label for=""> Digite seu peso:</label>
            <input class="formatado fonte" type="number" name="Peso" value="" id="Peso">
        </li>
        <li>    
            <Label>Digite sua altura:</Label>
            <input class="formatado fonte" type="number" name="Altura" value="" id="Altura">    
        </li>
        <li>
        <input type="button" value="Enviar" id="btnAlerta">
        </li>
    </ul>
    
    <h3 id="IMC"></h3>
    <h3 id="classificacao"></h3>
    <div id="tabela-imc" class="tabela-container">

    <h2>Tabela de IMC</h2>

    <table class="tabela">
        <thead>
            <tr>
                <th>Valor do IMC</th>
                <th>Classificação</th>
            </tr>
        </thead>

        <tbody>
            <tr id="baixo">
                <td>Menor que 18,5</td>
                <td>Baixo peso</td>
            </tr>

            <tr id="normal">
                <td>18,5 até 24,9</td>
                <td>Normal</td>
            </tr>

            <tr id="sobrepeso">
                <td>25 até 29,9</td>
                <td>Sobrepeso</td>
            </tr>

            <tr id="obesidade1">
                <td>30 até 34,9</td>
                <td>Obesidade Grau I</td>
            </tr>

            <tr id="obesidade2">
                <td>35 até 39,9</td>
                <td>Obesidade Grau II</td>
            </tr>

            <tr id="obesidade3">
                <td>Maior que 40</td>
                <td>Obesidade Grau III</td>
            </tr>
        </tbody>
    </table>

    </div>

    <script src="./script.js"></script>
</body>
</html>
